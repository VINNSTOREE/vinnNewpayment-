<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT🌟🔥</title>

<style>
body {
  margin:0;
  font-family: monospace;
  color:white;
  height:100vh;
  overflow:hidden;
}

/* 🔥 VIDEO BACKGROUND FIX */
#bgVideo {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* DARK OVERLAY */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* CENTER BOX */
.container {
  position:relative;
  z-index:1;
  width:90%;
  max-width:400px;
  margin:auto;
  top:50%;
  transform:translateY(-50%);
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.4);
  border-radius:20px;
}

/* LOGO */
.logo {
  width:90px;
  border-radius:50%;
  box-shadow:0 0 25px #00fff7;
}

/* BUTTON */
.btn {
  display:block;
  margin:12px 0;
  padding:14px;
  border-radius:12px;
  border:1px solid #00fff7;
  color:white;
  text-decoration:none;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
  z-index:10;
}

.modal-content {
  width:350px;
  padding:20px;
  border-radius:20px;
  text-align:center;
  background:#111;
}

/* INPUT */
input {
  width:85%;
  padding:12px;
  border-radius:12px;
  border:none;
  text-align:center;
}

/* QUICK */
.quick {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:10px 0;
}

.quick button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00fff7;
  font-weight:bold;
  cursor:pointer;
}

/* QR */
#qrisBox {display:none;}

#qrisImg {
  width:200px;
  border-radius:15px;
  box-shadow:0 0 30px #00fff7;
}

/* PROGRESS */
.progress-bar {
  width:100%;
  height:10px;
  background:#222;
  border-radius:10px;
}

.progress-fill {
  height:100%;
  width:0%;
  background:#00fff7;
}

/* SUCCESS */
#successBox {display:none;}

.link-btn {
  display:block;
  margin:10px;
  padding:12px;
  border-radius:12px;
  background:#00fff7;
  color:black;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- 🔥 VIDEO BACKGROUND (INI INTI FIX) -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="videoo.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- UI -->
<div class="container">
  <img src="-media-/logo.png" class="logo">
  <h2>VINN PAYMENT</h2>

  <div class="btn" onclick="openQRIS()">💳 QRIS OTOMATIS</div>
  <a class="btn" href="/DANA">💸 Dana</a>
  <a class="btn" href="/GOPAY">📲 GoPay</a>
</div>

<!-- MODAL -->
<div class="modal" id="modalQR">
  <div class="modal-content">

    <h3>QRIS PAYMENT</h3>

    <div class="quick">
      <button onclick="setNominal(1000)">1K</button>
      <button onclick="setNominal(10000)">10K</button>
      <button onclick="setNominal(50000)">50K</button>
      <button onclick="setNominal(100000)">100K</button>
      <button onclick="setNominal(200000)">200K</button>
    </div>

    <input type="number" id="nominal" placeholder="Masukkan nominal"><br><br>

    <button onclick="buatQR()">🔥 Bayar Sekarang</button>

    <div id="qrisBox">
      <img id="qrisImg"><br>
      <div id="trxId"></div>
      <div id="timer"></div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
      </div>

      <button onclick="cekManual()">🔄 Cek Status</button>
    </div>

    <div id="successBox">
      <h2>✅ PEMBAYARAN SUKSES</h2>

      <a class="link-btn" href="https://wa.me/6285352408213">Chat Owner</a>
      <a class="link-btn" href="https://whatsapp.com/channel/0029VadiD8q9WtBuMNO3R72I">Testimoni</a>
    </div>

  </div>
</div>

<script>
let transaksiId;
let progress=0;
let timeLeft=300;

function openQRIS(){
  document.getElementById("modalQR").style.display="flex"
}

function setNominal(n){
  document.getElementById("nominal").value=n
}

async function buatQR(){
  let nominal=document.getElementById("nominal").value
  if(!nominal) return alert("Isi nominal")

  let res=await fetch("/api/create",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({amount:Number(nominal)})
  })

  let data=await res.json()
  if(!data.qr) return alert("Gagal QR")

  transaksiId=data.id

  document.getElementById("qrisBox").style.display="block"
  document.getElementById("qrisImg").src=data.qr
  document.getElementById("trxId").innerText="ID: "+data.id

  startProgress()
  startTimer()
  autoCek()
}

function startProgress(){
  setInterval(()=>{
    progress+=2
    if(progress>100) progress=0
    document.getElementById("progress").style.width=progress+"%"
  },200)
}

function startTimer(){
  setInterval(()=>{
    timeLeft--
    document.getElementById("timer").innerText="Expired: "+timeLeft+"s"
  },1000)
}

async function cekManual(){
  let res=await fetch(`/api/status?id=${transaksiId}`)
  let data=await res.json()
  alert("Status: "+data.status)
}

function autoCek(){
  setInterval(async()=>{
    let res=await fetch(`/api/status?id=${transaksiId}`)
    let data=await res.json()

    if(data.status==="success"){
      document.getElementById("qrisBox").style.display="none"
      document.getElementById("successBox").style.display="block"
    }
  },4000)
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT</title>

<style>
body {
  margin:0;
  font-family: monospace;
  background:#05070d;
  overflow:hidden;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ⚡ PETIR */
.lightning::before, .lightning::after {
  content:"";
  position:absolute;
  width:2px;
  height:100%;
  background:linear-gradient(white,transparent);
  opacity:0;
  animation:flash 5s infinite;
}
.lightning::after { left:70%; animation-delay:2s; }

@keyframes flash {
  0%,90%,100%{opacity:0;}
  92%{opacity:1;}
  93%{opacity:0;}
}

/* RGB */
@keyframes rgb {
  0%{filter:hue-rotate(0);}
  100%{filter:hue-rotate(360deg);}
}

/* BOX */
.container {
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  position:relative;
  animation:rgb 6s linear infinite;
}
.container::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:20px;
  background:linear-gradient(0deg,#00fff7,#00ffaa,#00ffcc);
  animation:spin 6s linear infinite, rgb 6s linear infinite;
  z-index:-1;
}
.container::after {
  content:"";
  position:absolute;
  inset:2px;
  background:#0b0f1a;
  border-radius:20px;
  z-index:-1;
}

@keyframes spin {
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

/* LOGO */
.logo {
  width:90px;
  border-radius:50%;
  box-shadow:0 0 30px #00fff7;
}

/* BUTTON */
.btn {
  display:block;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  border:1px solid #00fff7;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
  z-index:9999;
}

/* MODAL BOX */
.modal-content {
  width:350px;
  padding:20px;
  border-radius:20px;
  text-align:center;
  position:relative;
  animation:pop .3s ease, rgb 6s linear infinite;
}
.modal-content::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:20px;
  background:linear-gradient(0deg,#00fff7,#00ffaa,#00ffcc);
  animation:spin 4s linear infinite, rgb 6s linear infinite;
  z-index:-1;
}
.modal-content::after {
  content:"";
  position:absolute;
  inset:2px;
  background:#0b0f1a;
  border-radius:20px;
  z-index:-1;
}

@keyframes pop {
  from{transform:scale(.6);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* QUICK */
.quick {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  justify-content:center;
}
.quick button {
  padding:7px;
  border:none;
  border-radius:10px;
  background:#00fff7;
  cursor:pointer;
}

/* INPUT */
input {
  width:80%;
  padding:10px;
  border-radius:10px;
  border:none;
  text-align:center;
}

/* LOADING */
.loader {
  display:none;
  margin-top:15px;
  animation: rgb 3s linear infinite;
}

/* QR */
#qrisBox {
  display:none;
  margin-top:10px;
  position:relative;
}

#qrisImg {
  width:200px;
  border-radius:12px;
  box-shadow:0 0 30px #00fff7;
  animation: zoomIn 0.6s ease;
}

@keyframes zoomIn {
  from {transform:scale(0.5);opacity:0;}
  to {transform:scale(1);opacity:1;}
}

/* SCAN LINE */
.scan-line {
  position:absolute;
  width:200px;
  height:2px;
  background:#00fff7;
  box-shadow:0 0 10px #00fff7;
  animation: scan 2s infinite;
}

@keyframes scan {
  0% {transform:translateY(0);}
  100% {transform:translateY(200px);}
}

/* SUCCESS */
#successBox {
  display:none;
  animation: zoom 0.5s ease;
}

@keyframes zoom {
  from{transform:scale(0.6);opacity:0}
  to{transform:scale(1);opacity:1}
}

.link-btn {
  display:block;
  margin:8px;
  padding:12px;
  border-radius:10px;
  background:#00fff7;
  color:black;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="lightning"></div>

<div class="container">
  <img src="-media-/logo.png" class="logo">
  <h2>VINN PAYMENT</h2>

  <div class="btn" onclick="openQRIS()">💳 QRIS OTOMATIS</div>
  <a class="btn" href="/DANA">💸 Dana</a>
  <a class="btn" href="/GOPAY">📲 GoPay</a>
</div>

<div class="modal" id="modalQR">
<div class="modal-content">

<h3>QRIS PAYMENT</h3>

<div class="quick">
  <button onclick="setNominal(1000)">1K</button>
  <button onclick="setNominal(5000)">5K</button>
  <button onclick="setNominal(10000)">10K</button>
  <button onclick="setNominal(20000)">20K</button>
  <button onclick="setNominal(50000)">50K</button>
  <button onclick="setNominal(100000)">100K</button>
</div>

<input type="number" id="nominal" placeholder="Nominal"><br><br>

<button onclick="buatQR()">🔥 Bayar Sekarang</button>

<div class="loader" id="loading">⏳ Membuat QRIS...</div>

<div id="qrisBox">
  <div class="scan-line"></div>
  <img id="qrisImg">
</div>

<div id="successBox">
  <h2>✅ Pembayaran Sukses</h2>
  <p>Pembayaran terdeteksi</p>

  <a class="link-btn" href="https://wa.me/6285352408213" target="_blank">Chat Owner</a>
  <a class="link-btn" href="https://whatsapp.com/channel/0029VadiD8q9WtBuMNO3R72I" target="_blank">Testimoni</a>
</div>

<br>
<button onclick="closeQRIS()">Tutup</button>

</div>
</div>

<script>
let transaksiId

function openQRIS(){
  document.getElementById("modalQR").style.display="flex"
}

function closeQRIS(){
  document.getElementById("modalQR").style.display="none"
}

function setNominal(n){
  document.getElementById("nominal").value=n
}

async function buatQR(){
  let nominal=document.getElementById("nominal").value
  if(!nominal) return alert("Isi nominal dulu")

  document.getElementById("loading").style.display="block"
  document.getElementById("qrisBox").style.display="none"

  let res=await fetch("/api/create",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ amount:Number(nominal) })
  })

  let data=await res.json()

  transaksiId=data.id

  setTimeout(()=>{
    document.getElementById("loading").style.display="none"
    document.getElementById("qrisBox").style.display="block"
    document.getElementById("qrisImg").src=data.qr
    autoCek()
  },1200)
}

function autoCek(){
  let i=setInterval(async()=>{
    let res=await fetch(`/api/status?id=${transaksiId}`)
    let data=await res.json()

    if(data.status==="success"){
      clearInterval(i)
      document.getElementById("qrisBox").style.display="none"
      document.getElementById("successBox").style.display="block"
    }
  },4000)
}
</script>

</body>
</html>

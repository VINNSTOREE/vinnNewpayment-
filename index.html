<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT</title>

<style>
body {
  font-family: 'Courier New', monospace;
  background: radial-gradient(circle at top, #2b1907, #4b2e0e, #1a0e02);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff8dc;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 500px;
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 20px;
  border: 1px solid gold;
  box-shadow: 0 0 30px gold;
  text-align: center;
}

h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}

.btn {
  display: block;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  background: linear-gradient(90deg,#ffce00,#ffb700);
  color: black;
  font-weight: bold;
  text-decoration: none;
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px gold;
}

/* MODAL QRIS */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111;
  padding: 20px;
  border-radius: 20px;
  border: 1px solid gold;
  box-shadow: 0 0 25px gold;
  text-align: center;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

.loader {
  display: none;
  margin-top: 10px;
}

img {
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>VINN PAYMENT</h1>
  <p>PAYMENT BY VINN STORE</p>

  <div class="btn" onclick="openQRIS()">💳 QRIS OTOMATIS</div>
  <a class="btn" href="/DANA">💸 Dana</a>
  <a class="btn" href="/GOPAY">📲 GoPay</a>
</div>

<!-- MODAL -->
<div class="modal" id="modalQR">
  <div class="modal-content">

    <h3>QRIS PAYMENT</h3>

    <input type="number" id="nominal" placeholder="Masukkan Nominal"><br><br>
    <button onclick="buatQR()">Bayar</button>

    <div class="loader" id="loading">⏳ Membuat QR...</div>

    <div id="qrisBox" style="display:none;">
      <img id="qrisImg" width="200"><br>
      <p id="textInfo"></p>

      <button onclick="cekManual()">🔄 Cek</button>
    </div>

    <br>
    <button onclick="closeQRIS()">Tutup</button>

  </div>
</div>

<script>

let transaksiId = null

function openQRIS(){
  document.getElementById("modalQR").style.display = "flex"
}

function closeQRIS(){
  document.getElementById("modalQR").style.display = "none"
}

// CREATE QR
async function buatQR(){
  let nominal = document.getElementById("nominal").value
  if(!nominal) return alert("Isi nominal")

  document.getElementById("loading").style.display = "block"

  let res = await fetch("/api/create", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ amount: Number(nominal) })
  })

  let data = await res.json()

  if(!data.success){
    alert("Gagal")
    return
  }

  transaksiId = data.id

  document.getElementById("loading").style.display = "none"
  document.getElementById("qrisBox").style.display = "block"

  document.getElementById("qrisImg").src = data.qr
  document.getElementById("textInfo").innerText =
    "Invoice: " + data.id + "\nRp" + data.amount.toLocaleString("id-ID")

  autoCek()
}

// CEK MANUAL
async function cekManual(){
  let res = await fetch(`/api/status?id=${transaksiId}`)
  let data = await res.json()

  alert("Status: " + data.status)
}

// AUTO CEK
function autoCek(){
  let interval = setInterval(async () => {

    let res = await fetch(`/api/status?id=${transaksiId}`)
    let data = await res.json()

    if(data.status === "success"){
      clearInterval(interval)
      alert("✅ Pembayaran berhasil")
    }

    if(data.status === "expired"){
      clearInterval(interval)
      alert("❌ Expired")
    }

  }, 5000)
}

</script>

</body>
</html>

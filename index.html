<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT QRIS</title>

<style>
body{
  font-family: monospace;
  background: linear-gradient(135deg,#000,#1a1a1a,#333);
  color:#fff;
  text-align:center;
}

.container{
  margin-top:50px;
}

input{
  padding:12px;
  border:none;
  border-radius:10px;
  text-align:center;
  width:200px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#ffd700;
}

.loader{
  display:none;
  margin-top:20px;
  animation: fade 1s infinite alternate;
}

@keyframes fade{
  from{opacity:0.3}
  to{opacity:1}
}

#qrisBox{
  display:none;
  margin-top:20px;
}

img{
  border-radius:15px;
  box-shadow:0 0 20px gold;
}
</style>
</head>

<body>

<div class="container">

<h2>💳 VINN QRIS PAYMENT</h2>

<!-- INPUT -->
<input type="number" id="nominal" placeholder="Masukkan Nominal"><br>
<button onclick="buatQR()">🔥 Bayar Sekarang</button>

<!-- LOADING -->
<div class="loader" id="loading">
  ⏳ Membuat QRIS...
</div>

<!-- QR -->
<div id="qrisBox">
  <img id="qrisImg" width="250"><br><br>
  <p id="textInfo"></p>

  <button onclick="cekManual()">🔄 Cek Manual</button>
</div>

</div>

<script>

let transaksiId = null

// ================= CREATE =================
async function buatQR(){
  let nominal = document.getElementById("nominal").value
  if(!nominal) return alert("Isi nominal dulu")

  document.getElementById("loading").style.display="block"

  try{
    let res = await fetch("/api/create", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ amount: Number(nominal) })
    })

    let data = await res.json()

    if(!data.success){
      alert(data.error || "Gagal")
      return
    }

    transaksiId = data.id

    document.getElementById("loading").style.display="none"
    document.getElementById("qrisBox").style.display="block"

    document.getElementById("qrisImg").src = data.qr
    document.getElementById("textInfo").innerText =
      "Invoice: " + data.id +
      "\nTotal: Rp" + data.amount.toLocaleString("id-ID")

    autoCek()

  }catch(e){
    alert("Server error")
    console.log(e)
  }
}

// ================= CEK MANUAL =================
async function cekManual(){
  if(!transaksiId) return

  let res = await fetch(`/api/status?id=${transaksiId}`)
  let data = await res.json()

  if(data.status === "success"){
    alert("✅ Pembayaran berhasil")
  }else if(data.status === "expired"){
    alert("❌ Transaksi expired")
  }else{
    alert("⏳ Belum dibayar")
  }
}

// ================= AUTO CEK =================
function autoCek(){
  let interval = setInterval(async () => {

    if(!transaksiId) return clearInterval(interval)

    let res = await fetch(`/api/status?id=${transaksiId}`)
    let data = await res.json()

    if(data.status === "success"){
      clearInterval(interval)

      alert("💳 Pembayaran terdeteksi!\n🚀 Processing...")

      // lanjut ke sistem lu (topup / notif dll)
    }

    if(data.status === "expired"){
      clearInterval(interval)
      alert("❌ QRIS expired")
    }

  }, 5000)
}

</script>

</body>
</html>

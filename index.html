<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT</title>

<style>
body {
  font-family: monospace;
  background: #05070d;
  overflow:hidden;
  margin:0;
  color:#fff;
}

/* ⚡ LIGHTNING EFFECT */
.lightning {
  position:fixed;
  width:100%;
  height:100%;
  background:transparent;
  pointer-events:none;
}

.lightning::before,
.lightning::after {
  content:"";
  position:absolute;
  width:2px;
  height:100%;
  background:linear-gradient(white, transparent);
  opacity:0;
  animation: flash 5s infinite;
}

.lightning::after {
  left:60%;
  animation-delay:2s;
}

@keyframes flash {
  0%,90%,100% {opacity:0;}
  92% {opacity:1;}
  93% {opacity:0;}
}

/* CENTER */
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* RGB */
@keyframes rgb {
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(360deg);}
}

/* CONTAINER */
.container {
  position: relative;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  animation: rgb 6s linear infinite;
}

.container::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  background:linear-gradient(0deg,#00fff7,#00ffcc,#00ffaa,#00fff7);
  animation: spin 6s linear infinite, rgb 6s linear infinite;
  z-index:-1;
}

.container::after {
  content:"";
  position:absolute;
  inset:2px;
  background:#0b0f1a;
  border-radius:20px;
  z-index:-1;
}

@keyframes spin {
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* LOGO */
.logo {
  width:90px;
  border-radius:50%;
  box-shadow:0 0 30px #00fff7;
}

/* BUTTON */
.btn {
  display:block;
  margin:12px 0;
  padding:14px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid #00fff7;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* MODAL */
.modal-content {
  position: relative;
  width: 360px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  animation: pop 0.4s ease, rgb 6s linear infinite;
}

.modal-content::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  background:linear-gradient(0deg,#00fff7,#00ffcc,#00ffaa,#00fff7);
  animation: spin 4s linear infinite, rgb 6s linear infinite;
  z-index:-1;
}

.modal-content::after {
  content:"";
  position:absolute;
  inset:2px;
  background:#0b0f1a;
  border-radius:20px;
  z-index:-1;
}

@keyframes pop {
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* QUICK */
.quick {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
}

.quick button {
  padding:8px;
  border:none;
  border-radius:10px;
  background:#00fff7;
}

/* QR */
#qrisBox { display:none; margin-top:10px; }

/* SUCCESS */
#successBox {
  display:none;
  animation: zoom 0.5s ease;
}

@keyframes zoom {
  from{transform:scale(0.6);opacity:0}
  to{transform:scale(1);opacity:1}
}

.link-btn {
  display:block;
  margin:10px;
  padding:12px;
  border-radius:10px;
  background:#00fff7;
  color:black;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="lightning"></div>

<div class="container">
  <img src="-media-/logo.png" class="logo">
  <h1>VINN PAYMENT</h1>

  <div class="btn" onclick="openQRIS()">💳 QRIS OTOMATIS</div>
</div>

<div class="modal" id="modalQR">
<div class="modal-content">

<h3>QRIS PAYMENT</h3>

<div class="quick">
  <button onclick="setNominal(1000)">1K</button>
  <button onclick="setNominal(5000)">5K</button>
  <button onclick="setNominal(10000)">10K</button>
  <button onclick="setNominal(20000)">20K</button>
  <button onclick="setNominal(50000)">50K</button>
  <button onclick="setNominal(100000)">100K</button>
</div>

<input type="number" id="nominal" placeholder="Nominal"><br><br>

<button onclick="buatQR()">Bayar</button>

<div id="qrisBox">
  <img id="qrisImg" width="200"><br>
</div>

<div id="successBox">
  <h2>✅ Pembayaran Sukses</h2>
  <p>Pembayaran terdeteksi</p>

  <a class="link-btn" href="https://wa.me/6285352408213" target="_blank">Chat Owner</a>
  <a class="link-btn" href="https://whatsapp.com/channel/0029VadiD8q9WtBuMNO3R72I" target="_blank">Testimoni</a>
</div>

<br>
<button onclick="closeQRIS()">Tutup</button>

</div>
</div>

<script>
let transaksiId=null

function openQRIS(){
  document.getElementById("modalQR").style.display="flex"
}

function closeQRIS(){
  document.getElementById("modalQR").style.display="none"
}

function setNominal(n){
  document.getElementById("nominal").value=n
}

async function buatQR(){
  let nominal=document.getElementById("nominal").value

  let res=await fetch("/api/create",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ amount:Number(nominal) })
  })

  let data=await res.json()

  transaksiId=data.id

  document.getElementById("qrisBox").style.display="block"
  document.getElementById("qrisImg").src=data.qr

  autoCek()
}

function autoCek(){
  let int=setInterval(async ()=>{
    let res=await fetch(`/api/status?id=${transaksiId}`)
    let data=await res.json()

    if(data.status==="success"){
      clearInterval(int)

      document.getElementById("qrisBox").style.display="none"
      document.getElementById("successBox").style.display="block"
    }
  },4000)
}
</script>

</body>
</html>

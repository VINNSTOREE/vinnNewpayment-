<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT</title>

<style>
body {
  font-family: monospace;
  background: radial-gradient(circle at top, #0a0f1f, #05070d);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  color:#fff;
}

/* CONTAINER */
.container {
  position: relative;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  z-index:10;
}

.container::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  background:linear-gradient(0deg,#00fff7,#00ffcc,#00ffaa,#00fff7);
  animation:spin 6s linear infinite;
  z-index:-1;
}

.container::after {
  content:"";
  position:absolute;
  inset:2px;
  background:#0b0f1a;
  border-radius:20px;
  z-index:-1;
}

@keyframes spin {
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* BUTTON */
.btn {
  display:block;
  margin:12px 0;
  padding:14px;
  border-radius:12px;
  background:rgba(0,255,247,0.1);
  border:1px solid #00fff7;
  color:#00fff7;
  font-weight:bold;
  cursor:pointer;
}

/* MODAL FIX */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999; /* 🔥 INI PENTING */
}

/* MODAL BOX */
.modal-content {
  position:relative;
  width:340px;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

/* NEON */
.modal-content::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  background:linear-gradient(0deg,#00fff7,#00ffcc,#00ffaa,#00fff7);
  animation:spin 4s linear infinite;
  z-index:-1;
}

.modal-content::after {
  content:"";
  position:absolute;
  inset:2px;
  background:#0b0f1a;
  border-radius:20px;
  z-index:-1;
}

/* INPUT */
input {
  width:80%;
  padding:10px;
  border-radius:10px;
  border:none;
  text-align:center;
}

/* QUICK */
.quick {
  display:flex;
  gap:5px;
  justify-content:center;
  margin-bottom:10px;
}

.quick button {
  padding:8px;
  border:none;
  border-radius:10px;
  background:#00fff7;
  cursor:pointer;
}

/* QR */
#qrisBox {
  display:none;
  margin-top:10px;
}

#qrisImg {
  border-radius:10px;
  box-shadow:0 0 20px #00fff7;
}

/* NOTIF */
.notif {
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  border:1px solid #00fff7;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:99999;
}
</style>
</head>

<body>

<div class="container">
  <h1 style="color:#00fff7;">VINN PAYMENT</h1>

  <div class="btn" onclick="openQRIS()">💳 QRIS OTOMATIS</div>
  <div class="btn">💸 Dana</div>
  <div class="btn">📲 GoPay</div>
</div>

<!-- MODAL -->
<div class="modal" id="modalQR">
  <div class="modal-content">

    <h3 style="color:#00fff7;">QRIS PAYMENT</h3>

    <div class="quick">
      <button onclick="setNominal(1000)">1K</button>
      <button onclick="setNominal(5000)">5K</button>
      <button onclick="setNominal(10000)">10K</button>
    </div>

    <input type="number" id="nominal" placeholder="Nominal"><br><br>

    <button onclick="buatQR()">Bayar</button>

    <div id="qrisBox">
      <img id="qrisImg" width="200"><br>
      <p id="textInfo"></p>
    </div>

    <br>
    <button onclick="closeQRIS()">Tutup</button>

  </div>
</div>

<div class="notif" id="notif"></div>

<script>

let transaksiId = null

function openQRIS(){
  console.log("CLICK KEDETEK") // 🔥 debug
  document.getElementById("modalQR").style.display="flex"
}

function closeQRIS(){
  document.getElementById("modalQR").style.display="none"
}

function showNotif(text){
  let n = document.getElementById("notif")
  n.innerText = text
  n.style.display="block"
  setTimeout(()=> n.style.display="none",3000)
}

function setNominal(n){
  document.getElementById("nominal").value = n
}

async function buatQR(){
  let nominal = document.getElementById("nominal").value
  if(!nominal) return showNotif("Isi nominal dulu")

  let res = await fetch("/api/create",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ amount:Number(nominal) })
  })

  let data = await res.json()

  if(!data.success){
    return showNotif("Gagal")
  }

  transaksiId = data.id

  document.getElementById("qrisBox").style.display="block"
  document.getElementById("qrisImg").src = data.qr
  document.getElementById("textInfo").innerText = data.id
}

</script>

</body>
</html>

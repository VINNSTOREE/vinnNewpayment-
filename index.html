<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT</title>

<style>
body {
  font-family: monospace;
  background: radial-gradient(circle at top, #2b1907, #4b2e0e, #1a0e02);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  color:#fff8dc;
}

/* CONTAINER */
.container {
  width:90%;
  max-width:400px;
  background:rgba(0,0,0,0.4);
  padding:25px;
  border-radius:20px;
  border:1px solid gold;
  box-shadow:0 0 30px gold;
  text-align:center;
}

.logo {
  width:90px;
  border-radius:50%;
  border:2px solid gold;
  box-shadow:0 0 20px gold;
}

h1 {
  color:gold;
}

/* BUTTON */
.btn {
  display:block;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  background:linear-gradient(90deg,#ffd700,#ffaa00);
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

/* 🔥 MODAL SULTAN */
.modal-content {
  position: relative;
  width: 340px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  animation: pop 0.5s ease;
}

/* NEON BORDER */
.modal-content::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 22px;
  background: linear-gradient(0deg, gold, #ffcc00, #ffaa00, gold);
  animation: spin 4s linear infinite;
  z-index: -1;
}

/* INNER BG */
.modal-content::after {
  content: "";
  position: absolute;
  inset: 2px;
  background: #111;
  border-radius: 20px;
  z-index: -1;
}

/* ANIMASI */
@keyframes spin {
  0% {transform: rotate(0deg);}
  100% {transform: rotate(360deg);}
}

@keyframes pop {
  from {transform:scale(0.7);opacity:0}
  to {transform:scale(1);opacity:1}
}

/* QUICK BUTTON */
.quick {
  display:flex;
  justify-content:center;
  gap:6px;
  margin-bottom:10px;
}

.quick button {
  padding:8px 10px;
  border:none;
  border-radius:10px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 10px gold;
}

.quick button:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px gold;
}

/* INPUT */
input {
  width:80%;
  padding:12px;
  border-radius:10px;
  border:none;
  text-align:center;
}

/* QR */
#qrisBox {
  display:none;
  margin-top:10px;
}

#qrisImg {
  border-radius:10px;
  box-shadow:0 0 20px gold;
  animation: zoomFade 0.6s ease;
}

@keyframes zoomFade {
  from {opacity:0; transform:scale(0.6);}
  to {opacity:1; transform:scale(1);}
}

/* LOADING */
.loader {
  display:none;
  margin-top:10px;
  animation:fade 1s infinite alternate;
}

@keyframes fade {
  from{opacity:0.3}
  to{opacity:1}
}

/* NOTIF */
.notif {
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  border:1px solid gold;
  padding:12px;
  border-radius:10px;
  box-shadow:0 0 20px gold;
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <img src="-media-/logo.png" class="logo">
  <h1>VINN PAYMENT</h1>

  <div class="btn" onclick="openQRIS()">💳 QRIS OTOMATIS</div>
  <a class="btn" href="/DANA">💸 Dana</a>
  <a class="btn" href="/GOPAY">📲 GoPay</a>
</div>

<!-- MODAL -->
<div class="modal" id="modalQR">
<div class="modal-content">

<h3 style="color:gold;">💳 QRIS PAYMENT</h3>

<div class="quick">
  <button onclick="setNominal(1000)">1K</button>
  <button onclick="setNominal(5000)">5K</button>
  <button onclick="setNominal(10000)">10K</button>
  <button onclick="setNominal(50000)">50K</button>
  <button onclick="setNominal(100000)">100K</button>
</div>

<input type="number" id="nominal" placeholder="Masukkan Nominal"><br><br>

<button onclick="buatQR()">🔥 Bayar Sekarang</button>

<div class="loader" id="loading">⏳ Membuat QRIS...</div>

<div id="qrisBox">
  <img id="qrisImg" width="200"><br>
  <p id="textInfo"></p>
  <button onclick="cekManual()">🔄 Cek Status</button>
</div>

<br>
<button onclick="closeQRIS()">Tutup</button>

</div>
</div>

<div class="notif" id="notif"></div>

<script>

let transaksiId = null

function openQRIS(){
  document.getElementById("modalQR").style.display="flex"
}

function closeQRIS(){
  document.getElementById("modalQR").style.display="none"
}

function showNotif(text){
  let n = document.getElementById("notif")
  n.innerText = text
  n.style.display="block"
  setTimeout(()=> n.style.display="none",3000)
}

function setNominal(val){
  document.getElementById("nominal").value = val
}

// CREATE
async function buatQR(){
  let nominal = document.getElementById("nominal").value
  if(!nominal) return showNotif("⚠️ Isi nominal dulu")

  document.getElementById("loading").style.display="block"

  let res = await fetch("/api/create",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ amount:Number(nominal) })
  })

  let data = await res.json()

  if(!data.success){
    showNotif(data.error || "❌ Gagal buat QR")
    return
  }

  transaksiId = data.id

  document.getElementById("loading").style.display="none"
  document.getElementById("qrisBox").style.display="block"

  document.getElementById("qrisImg").src = data.qr
  document.getElementById("textInfo").innerText =
    "Invoice: "+data.id+"\nRp"+Number(data.amount).toLocaleString("id-ID")

  autoCek()
}

// CEK MANUAL (FIX)
async function cekManual(){
  if(!transaksiId) return showNotif("❌ Belum ada transaksi")

  let res = await fetch(`/api/status?id=${transaksiId}`)
  let data = await res.json()

  if(!data || !data.status){
    return showNotif("⚠️ Status tidak ditemukan")
  }

  if(data.status === "success"){
    showNotif("✅ Pembayaran sukses!")
  }else if(data.status === "pending"){
    showNotif("⏳ Menunggu pembayaran")
  }else if(data.status === "expired"){
    showNotif("❌ QRIS expired")
  }else{
    showNotif("⚠️ Status: "+data.status)
  }
}

// AUTO CEK
function autoCek(){
  let interval = setInterval(async ()=>{

    let res = await fetch(`/api/status?id=${transaksiId}`)
    let data = await res.json()

    if(data.status === "success"){
      clearInterval(interval)
      showNotif("✅ Pembayaran berhasil!")
    }

    if(data.status === "expired"){
      clearInterval(interval)
      showNotif("❌ QRIS expired")
    }

  },5000)
}

</script>

</body>
</html>

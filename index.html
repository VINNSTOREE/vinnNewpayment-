<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT</title>

<style>
body {
  font-family: monospace;
  background: radial-gradient(circle at top, #0a0f1f, #05070d);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  color:#fff;
}

/* 🔥 CONTAINER NEON */
.container {
  position: relative;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  z-index:1;
}

/* NEON BORDER */
.container::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  background:linear-gradient(0deg,#00fff7,#00ffcc,#00ffaa,#00fff7);
  animation:spin 6s linear infinite;
  z-index:-1;
}

.container::after {
  content:"";
  position:absolute;
  inset:2px;
  background:#0b0f1a;
  border-radius:20px;
  z-index:-1;
}

/* ANIMASI */
@keyframes spin {
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* LOGO */
.logo {
  width:90px;
  border-radius:50%;
  box-shadow:0 0 20px #00fff7;
}

/* TITLE */
h1 {
  color:#00fff7;
  text-shadow:0 0 15px #00fff7;
}

/* BUTTON */
.btn {
  display:block;
  margin:12px 0;
  padding:14px;
  border-radius:12px;
  background:rgba(0,255,247,0.1);
  border:1px solid #00fff7;
  color:#00fff7;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

.btn:hover {
  background:#00fff7;
  color:black;
  box-shadow:0 0 20px #00fff7;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

/* MODAL CONTENT NEON */
.modal-content {
  position: relative;
  width: 340px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
}

/* BORDER NEON */
.modal-content::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  background:linear-gradient(0deg,#00fff7,#00ffcc,#00ffaa,#00fff7);
  animation:spin 4s linear infinite;
  z-index:-1;
}

.modal-content::after {
  content:"";
  position:absolute;
  inset:2px;
  background:#0b0f1a;
  border-radius:20px;
  z-index:-1;
}

/* QUICK */
.quick {
  display:flex;
  gap:6px;
  justify-content:center;
  margin-bottom:10px;
}

.quick button {
  padding:8px;
  border:none;
  border-radius:10px;
  background:#00fff7;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* INPUT */
input {
  width:80%;
  padding:10px;
  border-radius:10px;
  border:none;
  text-align:center;
}

/* QR */
#qrisBox {
  display:none;
  margin-top:10px;
}

#qrisImg {
  border-radius:10px;
  box-shadow:0 0 20px #00fff7;
  animation:zoom 0.5s ease;
}

@keyframes zoom {
  from{transform:scale(0.6);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* LOADING */
.loader {
  display:none;
  margin-top:10px;
  color:#00fff7;
}

/* NOTIF */
.notif {
  position:fixed;
  top:20px;
  right:20px;
  background:#0b0f1a;
  border:1px solid #00fff7;
  padding:12px;
  border-radius:10px;
  box-shadow:0 0 20px #00fff7;
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <img src="-media-/logo.png" class="logo">
  <h1>VINN PAYMENT</h1>

  <div class="btn" onclick="openQRIS()">💳 QRIS OTOMATIS</div>
  <a class="btn" href="/DANA">💸 Dana</a>
  <a class="btn" href="/GOPAY">📲 GoPay</a>
</div>

<!-- MODAL -->
<div class="modal" id="modalQR">
<div class="modal-content">

<h3 style="color:#00fff7;">💳 QRIS PAYMENT</h3>

<div class="quick">
  <button onclick="setNominal(1000)">1K</button>
  <button onclick="setNominal(5000)">5K</button>
  <button onclick="setNominal(10000)">10K</button>
  <button onclick="setNominal(50000)">50K</button>
  <button onclick="setNominal(100000)">100K</button>
</div>

<input type="number" id="nominal" placeholder="Masukkan Nominal"><br><br>

<button onclick="buatQR()">🔥 Bayar Sekarang</button>

<div class="loader" id="loading">⏳ Membuat QRIS...</div>

<div id="qrisBox">
  <img id="qrisImg" width="200"><br>
  <p id="textInfo"></p>
  <button onclick="cekManual()">🔄 Cek Status</button>
</div>

<br>
<button onclick="closeQRIS()">Tutup</button>

</div>
</div>

<div class="notif" id="notif"></div>

<script>
let transaksiId = null

function openQRIS(){
  document.getElementById("modalQR").style.display="flex"
}

function closeQRIS(){
  document.getElementById("modalQR").style.display="none"
}

function showNotif(text){
  let n = document.getElementById("notif")
  n.innerText = text
  n.style.display="block"
  setTimeout(()=> n.style.display="none",3000)
}

function setNominal(val){
  document.getElementById("nominal").value = val
}

async function buatQR(){
  let nominal = document.getElementById("nominal").value
  if(!nominal) return showNotif("Isi nominal dulu")

  document.getElementById("loading").style.display="block"

  let res = await fetch("/api/create",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ amount:Number(nominal) })
  })

  let data = await res.json()

  if(!data.success){
    showNotif("Gagal buat QR")
    return
  }

  transaksiId = data.id

  document.getElementById("loading").style.display="none"
  document.getElementById("qrisBox").style.display="block"

  document.getElementById("qrisImg").src = data.qr
  document.getElementById("textInfo").innerText =
    "Invoice: "+data.id+"\nRp"+Number(data.amount).toLocaleString("id-ID")

  autoCek()
}

async function cekManual(){
  if(!transaksiId) return showNotif("Belum ada transaksi")

  let res = await fetch(`/api/status?id=${transaksiId}`)
  let data = await res.json()

  if(!data.status) return showNotif("Status tidak ditemukan")

  showNotif("Status: "+data.status)
}

function autoCek(){
  let interval = setInterval(async ()=>{
    let res = await fetch(`/api/status?id=${transaksiId}`)
    let data = await res.json()

    if(data.status === "success"){
      clearInterval(interval)
      showNotif("✅ Pembayaran sukses!")
    }

    if(data.status === "expired"){
      clearInterval(interval)
      showNotif("❌ Expired")
    }

  },5000)
}
</script>

</body>
</html>

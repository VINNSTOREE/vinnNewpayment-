<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINN PAYMENT🌟🔥</title>

<style>
body {
  margin:0;
  font-family: monospace;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
#bgVideo {
  position:fixed;
  right:0;
  bottom:0;
  min-width:100%;
  min-height:100%;
  object-fit:cover;
  z-index:-2;
}

/* DARK OVERLAY */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* BOX */
.container {
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

/* LOGO */
.logo {
  width:100px;
  border-radius:50%;
  box-shadow:0 0 40px #00fff7;
}

/* BUTTON */
.btn {
  display:block;
  margin:12px 0;
  padding:15px;
  border-radius:14px;
  border:1px solid #00fff7;
  text-decoration:none;
  color:white;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
}

.modal-content {
  width:370px;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

/* INPUT */
input {
  width:85%;
  padding:12px;
  border-radius:12px;
  border:none;
  text-align:center;
}

/* QUICK */
.quick {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
  margin-bottom:10px;
}

.quick button {
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  background:#00fff7;
  cursor:pointer;
}

/* QR */
#qrisBox {display:none;}

#qrisImg {
  width:220px;
  border-radius:16px;
  box-shadow:0 0 40px #00fff7;
}

/* PROGRESS */
.progress-bar {
  width:100%;
  height:10px;
  background:#222;
  border-radius:10px;
}

.progress-fill {
  height:100%;
  width:0%;
  background:#00fff7;
}

/* SUCCESS */
#successBox {display:none;}

.link-btn {
  display:block;
  margin:10px;
  padding:14px;
  border-radius:12px;
  background:#00fff7;
  color:black;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- 🔥 VIDEO BACKGROUND (FIXED AUTO PLAY) -->
<video id="bgVideo" autoplay muted loop playsinline preload="auto">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- AUDIO BACKGROUND -->
<audio id="bgMusic" autoplay loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<div class="container">
  <img src="-media-/logo.png" class="logo">
  <h2>VINN PAYMENT</h2>

  <div class="btn" onclick="openQRIS()">💳 QRIS OTOMATIS</div>
  <a class="btn" href="/DANA">💸 Dana</a>
  <a class="btn" href="/GOPAY">📲 GoPay</a>
</div>

<!-- MODAL -->
<div class="modal" id="modalQR">
<div class="modal-content">

<h3>QRIS PAYMENT</h3>

<div class="quick">
  <button onclick="setNominal(1000)">1K</button>
  <button onclick="setNominal(10000)">10K</button>
  <button onclick="setNominal(50000)">50K</button>
  <button onclick="setNominal(100000)">100K</button>
  <button onclick="setNominal(200000)">200K</button>
</div>

<input type="number" id="nominal" placeholder="Masukkan nominal"><br><br>

<button id="btnBayar" onclick="buatQR()">🔥 Bayar Sekarang</button>

<div id="qrisBox">
  <img id="qrisImg"><br>

  <div id="trxId"></div>
  <div id="timer"></div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <button onclick="cekManual()">🔄 Cek Status</button>
</div>

<div id="successBox">
  <h2>✅ PEMBAYARAN SUKSES</h2>

  <a class="link-btn" href="https://wa.me/6285352408213">Chat Owner</a>
  <a class="link-btn" href="https://whatsapp.com/channel/0029VadiD8q9WtBuMNO3R72I">Testimoni</a>
</div>

</div>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let transaksiId, progress=0, intervalCek, intervalProgress, timeLeft=300

function openQRIS(){
  document.getElementById("modalQR").style.display="flex"
}

function setNominal(n){
  document.getElementById("nominal").value=n
}

async function buatQR(){
  let nominal=document.getElementById("nominal").value
  if(!nominal) return alert("Isi nominal")

  let res=await fetch("/api/create",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:Number(nominal)})})
  let data=await res.json()

  if(!data.qr) return alert("Gagal QR")

  transaksiId=data.id

  document.getElementById("qrisBox").style.display="block"
  document.getElementById("qrisImg").src=data.qr
  document.getElementById("trxId").innerText="ID: "+data.id

  startProgress()
  startTimer()
  autoCek()
}

function startProgress(){
  intervalProgress=setInterval(()=>{
    progress+=2
    if(progress>100) progress=0
    document.getElementById("progress").style.width=progress+"%"
  },200)
}

function startTimer(){
  let t=setInterval(()=>{
    timeLeft--
    document.getElementById("timer").innerText="Expired: "+timeLeft+"s"
    if(timeLeft<=0) clearInterval(t)
  },1000)
}

async function cekManual(){
  let res=await fetch(`/api/status?id=${transaksiId}`)
  let data=await res.json()
  alert("Status: "+data.status)
}

function autoCek(){
  intervalCek=setInterval(async()=>{
    let res=await fetch(`/api/status?id=${transaksiId}`)
    let data=await res.json()

    if(data.status==="success"){
      clearInterval(intervalCek)
      clearInterval(intervalProgress)

      document.getElementById("qrisBox").style.display="none"
      document.getElementById("successBox").style.display="block"
      document.getElementById("sound").play()
    }
  },4000)
}

/* 🔥 FORCE PLAY VIDEO (FIX BLANK ISSUE) */
window.addEventListener("load", () => {
  let v = document.getElementById("bgVideo")
  v.play().catch(()=>{})
})
</script>

</body>
</html>
